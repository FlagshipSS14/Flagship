- type: job
  id: MPOfficer
  name: job-name-mpofficer
  description: job-description-mpofficer
  playTimeTracker: JobMPOfficer
  setPreference: true
  startingGear: MPOfficerGear
  icon: "JobIconMPOfficer"
  supervisors: job-supervisors-sc
  requirements:
    - !type:DepartmentTimeRequirement
      department: MilitaryPolice
      time: 54000 # 15 hours
  displayWeight: 60
  accessGroups:
  - Command
  special:
  - !type:AddImplantSpecial
     implants: [ MindShieldImplant ]

