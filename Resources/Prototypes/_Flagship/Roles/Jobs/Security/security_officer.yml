- type: startingGear
  id: MPOfficerGear
  equipment:
    id: MilitaryPoliceOfficerPDA
    head: ClothingHeadHatBeretMilitaryPolice
    eyes: ClothingEyesGlassesMilitaryPolice
    ears: ClothingHeadsetMilitaryPolice
    mask: ClothingMaskNeckGaiter
    neck: SecurityWhistle
    outerClothing: ClothingOuterArmorBasic
    jumpsuit: ClothingUniformJumpsuitMilitaryPoliceOfficer
    gloves: ClothingHandsGlovesCombat
    back: ClothingBackpackMilitaryPolice
    belt: ClothingBeltMilitaryPoliceWebbingFilled
    shoes: ClothingShoesBootsCombatFilled
