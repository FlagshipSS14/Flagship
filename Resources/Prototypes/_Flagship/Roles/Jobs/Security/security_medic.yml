- type: startingGear
  id: MPMedicGear
  equipment:
    id: MilitaryPoliceMedicPDA
    head: ClothingHeadHatBeretMilitaryPoliceMedic
    eyes: ClothingEyesGlassesMilitaryPoliceMedic
    ears: ClothingHeadsetMilitaryPoliceMedic
    mask: ClothingMaskSterile
    neck: SecurityWhistle
    outerClothing: ClothingOuterArmorBasic
    jumpsuit: ClothingUniformJumpsuitMilitaryPoliceOfficer
    gloves: ClothingHandsGlovesNitrile
    back: ClothingBackpackMilitaryPolice
    belt: ClothingBeltMilitaryPoliceMedicFilled
    shoes: ClothingShoesBootsCombatFilled
