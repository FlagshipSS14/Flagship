- type: job
  id: MPMedic
  name: job-name-mpmedic
  description: job-description-mpmedic
  playTimeTracker: JobMPMedic
  setPreference: true
  startingGear: MPMedicGear
  icon: "JobIconMPMedic"
  supervisors: job-supervisors-sc
  requirements:
    - !type:DepartmentTimeRequirement
      department: MilitaryPolice
      time: 54000 # 15 hours
  displayWeight: 80
  accessGroups:
  - Command
  special:
  - !type:AddImplantSpecial
     implants: [ MindShieldImplant ]

