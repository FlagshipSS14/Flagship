- type: startingGear
  id: OperationsOfficerGear
  equipment:
    id: OperationsOfficerPDA
    head: ClothingHeadHatBeretNavy
    eyes: ClothingEyesGlassesCommand
    ears: ClothingHeadsetAltOperationsOfficer
    jumpsuit: ClothingUniformJumpsuitOperationsOfficer
    gloves: ClothingHandsGlovesNavyOfficer
    back: ClothingBackpackSatchelBridgeCommand
    shoes: ClothingShoesBootsJack
  storage:
    back:
    - Flash
