- type: job
  id: ExecutiveOfficer
  name: job-name-executiveofficer
  description: job-description-executiveofficer
  playTimeTracker: JobExecutiveOfficer
  setPreference: true
  supervisors: job-supervisors-co
  requireAdminNotify: true
  requirements:
    - !type:DepartmentTimeRequirement
      department: Maintenance
      time: 54000 # 15 hours
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 54000 # 15 hours
    - !type:DepartmentTimeRequirement
      department: Security
      time: 54000 # 15 hours
  displayWeight: 90
  startingGear: ExecutiveOfficerGear
  icon: "JobIconExecutiveOfficer"
  access:
  - Captain
  accessGroups:
  - Command
  - AllAccess
  special:
  - !type:AddImplantSpecial
     implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
     components:
       - type: CommandStaff

- type: startingGear
  id: ExecutiveOfficerGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitCaptain
    shoes: ClothingShoesBootsCombatFilled
    head: ClothingHeadHatBeretCommand
    eyes: ClothingEyesGlassesCommand
    gloves: ClothingHandsGlovesCaptain
    back: ClothingBackpackSatchelLeather
    belt: ClothingBeltHolster
    id: ExecutiveOfficerPDA
    ears: ClothingHeadsetAltExecutiveOfficer
  storage:
    back:
    - Flash
