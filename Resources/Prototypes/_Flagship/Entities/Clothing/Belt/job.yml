- type: entity
  parent: [ClothingBeltStorageBase, ContentsExplosionResistanceBase, BaseSecurityContraband]
  id: ClothingBeltMilitaryPolice
  name: Military Police belt
  description: Can hold military police gear like handcuffs and flashes.
  components:
  - type: Sprite
    sprite: _Flagship/Clothing/Belt/militarypolice.rsi
  - type: Clothing
    sprite: _Flagship/Clothing/Belt/militarypolice.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Storage
    whitelist:
      tags:
      - CigPack
      - Taser
      - SecBeltEquip
      - Radio
      - Sidearm
      - MagazinePistol
      - MagazineMagnum
      - CombatKnife
      - Truncheon
      - HandGrenade
      components:
      - Stunbaton
      - FlashOnTrigger
      - SmokeOnTrigger
      - Flash
      - Handcuff
      - BallisticAmmoProvider
      - CartridgeAmmo
      - DoorRemote
      - Whistle
      - BalloonPopper
  - type: ItemMapper
    sprite: &BeltOverlay _Flagship/Clothing/Belt/belt_overlay.rsi
    mapLayers:
      flashbang:
        whitelist:
          components:
          - FlashOnTrigger
      stunbaton:
        whitelist:
          components:
          - Stunbaton
      tear_gas_grenade:
        whitelist:
          components:
          - SmokeOnTrigger
  - type: Appearance

