    channels:
    - BridgeCommand
    - Tactical
    - Operations
    - Security
    - Supply
    - Maintenance
    - Medical
    - Science
    - Service
    - Common
    defaultChannel: BridgeCommand
  - type: Item
    sprite: _Flagship/Objects/Devices/encryption_keys.rsi
