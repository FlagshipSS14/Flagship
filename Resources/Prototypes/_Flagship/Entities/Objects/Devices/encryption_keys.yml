# Departments Keys
- type: entity
  parent: EncryptionKey
  id: EncryptionKeyMaintenance
  name: Maintenance encryption key
  description: An encryption key for the maintenance communications channel.
  components:
  - type: EncryptionKey
    channels:
    - Common
    - Maintenance
    defaultChannel: Maintenance
  - type: Item
    sprite: Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_gray
    - state: eng_label

