- type: entity
  parent: Clothing
  id: IDCardFlagship
  name: identification card
  description: A card necessary to access various areas aboard the station.
  abstract: true
  components:
  - type: Sprite
    sprite: _Flagship/Objects/Misc/id_cards.rsi
  - type: Clothing
    slots:
    - idcard
    sprite: _Flagship/Objects/Misc/id_cards.rsi
  - type: Item
    size: Small
    heldPrefix: default
    storedRotation: -90
  - type: Access
  - type: IdCard
  - type: StationRecordKeyStorage
  - type: Tag
    tags:
    - DoorBumpOpener
    - WhitelistChameleon
    - WhitelistChameleonIdCard
  - type: StealTarget
    stealGroup: IDCard

- type: entity
  parent: [IDCardFlagship, BaseGrandTheftContraband]
  id: CommandingOfficerIDCard
  name: Commanding Officer's ID Card
  components:
  - type: Sprite
    layers:
    - state: black
    - state: stripe_top
      color: "#155182"
    - state: stripe_bottom
      color: "#144167"
    - sprite: _Flagship/Interface/Misc/job_icons.rsi
      offset: -0.09375, 0.0625
      state: CommandingOfficer
  - type: Item
    heldPrefix: black
  - type: PresetIdCard
    job: CommandingOfficer
  - type: Tag
    tags:
    - DoorBumpOpener
    - WhitelistChameleon
    - WhitelistChameleonIdCard
    - HighRiskItem
  - type: StealTarget
    stealGroup: CaptainIDCard

